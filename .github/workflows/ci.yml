name: CI

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    name: API (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ERPTask.sln

      - name: Build
        run: dotnet build ERPTask.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Tests/Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish (smoke check)
        run: dotnet publish ERPTask/ERPTask.csproj -c Release -o ./publish --no-build

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Web/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [api, web]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ERPTask/Dockerfile
          push: false
          tags: erp-api:ci

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ./Web
          file: Web/Dockerfile
          push: false
          tags: erp-web:ci
